spring.application.name=PaymentPro
server.port=6161

resilience4j.circuitbreaker.instances.orderService.register-health-indicator=true
resilience4j.circuitbreaker.instances.orderService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.orderService.sliding-window-size=5
resilience4j.circuitbreaker.instances.orderService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.orderService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.orderService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.orderService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.orderService.automatic-transition-from-open-to-half-open-enabled=true


management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakerevents
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
management.health.ratelimiters.enabled=true